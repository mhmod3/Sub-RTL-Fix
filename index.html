<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مُصلح الترجمة - دعم الكتابة من اليمين إلى اليسار</title>
  <style>
   
    @font-face {
      font-family: 'Adobe Arabic';
      src: url('https://raw.githubusercontent.com/mhmod3/Sub-RTL-Fix/refs/heads/main/22016-adobearabic.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Adobe Arabic', 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.8;
      font-size: clamp(1.125rem, 1.5vw, 1.35rem);
    }
    .main { max-width: 760px; width: 100%; }
    h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-align: center;
      color: #f0f0f0;
      letter-spacing: 0.5px;
    }
    .sub {
      color: #aaa;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      border-bottom: 1px solid #333;
      padding-bottom: 1.2rem;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 2;
    }
    .sub .format-hint {
      display: block;
      font-size: clamp(0.9rem, 1.2vw, 1.1rem);
      color: #777;
      margin-top: 0.25rem;
    }
    .drop {
      border: 2px dashed #444;
      padding: 3rem 1.5rem;
      text-align: center;
      background: #252525;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background 0.2s, border-color 0.2s;
      border-radius: 10px;
    }
    .drop:hover { background: #2e2e2e; border-color: #666; }
    .drop input { display: none; }
    .drop label {
      display: block;
      cursor: pointer;
      color: #ccc;
      font-size: clamp(1.1rem, 1.6vw, 1.4rem);
    }
    .drop span { font-weight: 600; color: #fff; }

    .file-info {
      display: flex;
      justify-content: space-between;
      background: #252525;
      padding: 0.8rem 1.2rem;
      font-size: clamp(1rem, 1.3vw, 1.2rem);
      margin-bottom: 1.5rem;
      border: 1px solid #333;
      border-radius: 8px;
    }
    .file-info .name { font-weight: 500; color: #f0f0f0; }
    .file-info .size { color: #999; }

    .actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .actions button {
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e0e0e0;
      padding: 0.7rem 2rem;
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s;
      border-radius: 8px;
      font-family: inherit;
    }
    .actions button.primary {
      background: #3a5a7a;
      color: white;
      border-color: #3a5a7a;
    }
    .actions button.primary:hover { background: #2a4a6a; }
    .actions button.primary:disabled { opacity: 0.5; pointer-events: none; }
    .actions button.secondary:hover { background: #3a3a3a; }
    .actions button.danger { color: #f88; }
    .actions button.danger:hover { background: #3a1a1a; }

    .output-wrap { display: none; margin-top: 1.5rem; border-top: 1px solid #333; padding-top: 1.5rem; }
    .output-wrap textarea {
      width: 100%;
      height: 260px;
      border: 1px solid #444;
      padding: 1rem;
      font-family: 'Adobe Arabic', 'Courier New', monospace; /* استخدام الخط مع احتفاظ بخصائص أحادية المسافة */
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      background: #1e1e1e;
      color: #e0e0e0;
      resize: vertical;
      direction: ltr;
      text-align: left;
      border-radius: 8px;
      line-height: 1.8;
    }
    .out-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .out-actions button {
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e0e0e0;
      padding: 0.6rem 2rem;
      font-size: clamp(1rem, 1.3vw, 1.2rem);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
      border-radius: 8px;
      font-family: inherit;
    }
    .out-actions button.green {
      background: #2a7a5a;
      color: white;
      border-color: #2a7a5a;
    }
    .out-actions button.green:hover { background: #1a6a4a; }
    .out-actions button.gray:hover { background: #3a3a3a; }

    .status {
      margin-top: 1rem;
      font-size: clamp(1rem, 1.3vw, 1.15rem);
      color: #aaa;
      text-align: center;
    }
    .status.error { color: #f77; }
    .status.success { color: #5c9; }
  </style>
</head>
<body>
<div class="main">
  <h1>مُصلح اتجاه النص</h1>
  <div class="sub">
    <span>أداة لضبط اتجاه النصوص في ملفات الترجمة</span>
    <span class="format-hint">يدعم صيغ SRT، VTT، ASS</span>
  </div>

  <div class="drop" id="dropZone">
    <input type="file" id="fileInput" accept=".srt,.vtt,.ass,.txt">
    <label for="fileInput"><span>اختر ملفاً</span> أو اسحبه إلى هنا</label>
  </div>

  <div class="file-info" id="fileInfo" style="display:none;">
    <span class="name" id="fileName">لا يوجد ملف</span>
    <span class="size" id="fileSize">0 ك.ب</span>
  </div>

  <div class="actions">
    <button class="primary" id="processBtn" disabled>معالجة وإصلاح</button>
    <button class="secondary" id="clearBtn">تفريغ</button>
  </div>

  <div class="output-wrap" id="outputWrap">
    <textarea id="outputText" readonly></textarea>
    <div class="out-actions">
      <button class="green" id="downloadBtn">تحميل الملف المُصلح</button>
      <button class="gray" id="copyBtn">نسخ النص</button>
    </div>
    <div id="statusMessage" class="status"></div>
  </div>
</div>

<script>

if (!String.prototype.clearFormatting) {
  Object.assign(String.prototype, {
    clearFormatting: function() {
      return this.replace(/[\u202A\u202B\u202C\u202D\u202E\u200E\u200F]/g, '');
    },
    toRTL: function() {
      return '\u202B' + this + '\u202C';
    },
    toLTR: function() {
      return '\u202A' + this + '\u202C';
    }
  });
}


function extractTags(text) {
  const tags = [];
  const stripped = text.replace(/<[^>]*>|\\{[^}]*\\}/g, function(match) {
    tags.push(match);
    return '\x00' + (tags.length - 1) + '\x00';
  });
  return { stripped, tags };
}

function restoreTags(text, tags) {
  return text.replace(/\x00(\d+)\x00/g, function(_, idx) {
    return tags[parseInt(idx)] || '';
  });
}


function fixTextWithRTL(text) {
  if (!text) return text;
  const { stripped, tags } = extractTags(text);
  let cleaned = stripped.clearFormatting();
  const lines = cleaned.split('\n');
  const fixedLines = lines.map(line => line.toRTL());
  let fixed = fixedLines.join('\n');
  return restoreTags(fixed, tags);
}


function detectFormat(content) {
  if (/^\[Script Info\]/im.test(content) || /^Dialogue:/im.test(content)) return 'ass';
  if (/^WEBVTT/i.test(content.trim())) return 'vtt';
  return 'srt';
}

function processSRT(content) {
  const blocks = content.split(/\n\s*\n/);
  const processed = blocks.map(block => {
    const lines = block.split('\n').filter(line => line.trim() !== '');
    if (lines.length < 3) return block;
    const number = lines[0];
    const time = lines[1];
    const textLines = lines.slice(2);
    if (textLines.length === 0) return block;
    let text = textLines.join('\n');
    text = fixTextWithRTL(text);
    const fixedLines = text.split('\n');
    return [number, time, ...fixedLines].join('\n');
  });
  return processed.join('\n\n');
}

function processVTT(content) {
  const lines = content.split('\n');
  let headerEnd = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('-->')) {
      headerEnd = i;
      break;
    }
  }
  const header = lines.slice(0, headerEnd).join('\n');
  const body = lines.slice(headerEnd).join('\n');
  const fixedBody = processSRT(body);
  return header + '\n' + fixedBody;
}

function processASS(content) {
  const lines = content.split('\n');
  const processed = lines.map(line => {
    if (line.startsWith('Dialogue:')) {
      const parts = line.split(',');
      if (parts.length < 10) return line;
      const textPart = parts.slice(9).join(',');
      const fixedText = fixTextWithRTL(textPart);
      const newParts = parts.slice(0, 9);
      newParts.push(fixedText);
      return newParts.join(',');
    }
    if (line.startsWith('Title:')) {
      const titleMatch = line.match(/^Title:\s*(.*)/);
      if (titleMatch) {
        const titleText = titleMatch[1];
        const fixed = fixTextWithRTL(titleText);
        return 'Title: ' + fixed;
      }
    }
    return line;
  });
  return processed.join('\n');
}

function fixSubtitleFile(content) {
  const format = detectFormat(content);
  switch (format) {
    case 'ass': return processASS(content);
    case 'vtt': return processVTT(content);
    default: return processSRT(content);
  }
}


function scoreText(text) {
  let score = 0;
  const total = text.length;
  if (total === 0) return 0;
  let arabic = 0, latin = 0, digits = 0, punct = 0, bad = 0;
  for (let i = 0; i < total; i++) {
    const ch = text.charCodeAt(i);
    if (ch >= 0x0600 && ch <= 0x06FF) arabic++;
    else if ((ch >= 0x0041 && ch <= 0x005A) || (ch >= 0x0061 && ch <= 0x007A)) latin++;
    else if (ch >= 0x0030 && ch <= 0x0039) digits++;
    else if (ch === 0x0020 || ch === 0x002E || ch === 0x002C || ch === 0x003F || ch === 0x0021 ||
             ch === 0x003B || ch === 0x003A || ch === 0x002D || ch === 0x005F || ch === 0x0028 ||
             ch === 0x0029 || ch === 0x005B || ch === 0x005D || ch === 0x007B || ch === 0x007D ||
             ch === 0x002F || ch === 0x005C || ch === 0x0040 || ch === 0x0023 || ch === 0x0024 ||
             ch === 0x0025 || ch === 0x005E || ch === 0x0026 || ch === 0x002A) punct++;
    else if (ch > 0x007F && ch < 0x0600) bad++;
  }
  const good = arabic + latin + digits + punct;
  const goodRatio = good / total;
  const badPenalty = bad / total * 0.5;
  const arabicBonus = Math.min(arabic / total * 0.3, 0.3);
  return goodRatio - badPenalty + arabicBonus;
}

function decodeAuto(buffer) {
  const encodings = ['UTF-8', 'windows-1256', 'ISO-8859-6', 'UTF-16LE', 'UTF-16BE', 'CP1256'];
  let best = null;
  let bestScore = -Infinity;
  for (let enc of encodings) {
    try {
      const decoder = new TextDecoder(enc, { fatal: false });
      const decoded = decoder.decode(buffer);
      const score = scoreText(decoded);
      if (score > bestScore) {
        bestScore = score;
        best = { text: decoded, encoding: enc };
      }
    } catch { continue; }
  }
  if (best) return best;
  const fallback = new TextDecoder('UTF-8', { fatal: false });
  const decoded = fallback.decode(buffer);
  return { text: decoded, encoding: 'UTF-8 (fallback)' };
}


let currentFileData = null;
let currentFileName = '';
let currentFileSize = 0;
let currentDecodedText = '';

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const processBtn = document.getElementById('processBtn');
const clearBtn = document.getElementById('clearBtn');
const outputWrap = document.getElementById('outputWrap');
const outputText = document.getElementById('outputText');
const downloadBtn = document.getElementById('downloadBtn');
const copyBtn = document.getElementById('copyBtn');
const statusMsg = document.getElementById('statusMessage');

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    currentFileData = e.target.result;
    currentFileName = file.name;
    currentFileSize = file.size;
    fileName.textContent = file.name;
    fileSize.textContent = (file.size / 1024).toFixed(1) + ' ك.ب';
    fileInfo.style.display = 'flex';
    statusMsg.textContent = '';
    statusMsg.className = 'status';
    outputWrap.style.display = 'none';
    processBtn.disabled = false;
    autoDecodeAndPreview();
  };
  reader.readAsArrayBuffer(file);
}

function autoDecodeAndPreview() {
  if (!currentFileData) return;
  const result = decodeAuto(currentFileData);
  currentDecodedText = result.text;
  statusMsg.textContent = 'تم فك الترميز بنجاح باستخدام ' + result.encoding;
  statusMsg.className = 'status';
  const preview = result.text.slice(0, 500) + (result.text.length > 500 ? '\n... (معاينة)' : '');
  outputText.value = preview;
  outputWrap.style.display = 'block';
}

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.style.background = '#2e2e2e';
});
dropZone.addEventListener('dragleave', () => {
  dropZone.style.background = '#252525';
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.background = '#252525';
  if (e.dataTransfer.files.length > 0) {
    fileInput.files = e.dataTransfer.files;
    loadFile(e.dataTransfer.files[0]);
  }
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) loadFile(fileInput.files[0]);
});

processBtn.addEventListener('click', function() {
  if (!currentFileData) {
    statusMsg.textContent = 'الرجاء تحميل ملف أولاً.';
    statusMsg.className = 'status error';
    return;
  }
  const textToFix = currentDecodedText;
  if (!textToFix) {
    statusMsg.textContent = 'لا يوجد نص مفكوك، حاول إعادة التحميل.';
    statusMsg.className = 'status error';
    return;
  }
  try {
    const fixed = fixSubtitleFile(textToFix);
    outputText.value = fixed;
    outputWrap.style.display = 'block';
    statusMsg.textContent = 'تمت المعالجة بنجاح. النصوص الآن متوافقة مع الكتابة من اليمين إلى اليسار.';
    statusMsg.className = 'status success';
    window._fixedContent = fixed;
    window._originalName = currentFileName;
  } catch(err) {
    statusMsg.textContent = 'حدث خطأ أثناء المعالجة: ' + err.message;
    statusMsg.className = 'status error';
    outputWrap.style.display = 'none';
  }
});

downloadBtn.addEventListener('click', function() {
  const content = outputText.value;
  if (!content) return;
  const baseName = currentFileName.replace(/\.[^.]+$/, '') + '_مصلح';
  const ext = currentFileName.includes('.') ? '.' + currentFileName.split('.').pop() : '.srt';
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = baseName + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

copyBtn.addEventListener('click', function() {
  const text = outputText.value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    statusMsg.textContent = 'تم نسخ النص إلى الحافظة.';
    statusMsg.className = 'status success';
  }).catch(() => {
    outputText.select();
    document.execCommand('copy');
    statusMsg.textContent = 'تم نسخ النص إلى الحافظة.';
    statusMsg.className = 'status success';
  });
});

clearBtn.addEventListener('click', function() {
  fileInput.value = '';
  currentFileData = null;
  currentFileName = '';
  currentFileSize = 0;
  currentDecodedText = '';
  fileInfo.style.display = 'none';
  outputWrap.style.display = 'none';
  statusMsg.textContent = '';
  statusMsg.className = 'status';
  processBtn.disabled = true;
  outputText.value = '';
});

processBtn.disabled = true;
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());
</script>
</body>
</html>
