<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مُصلح الترجمة - دعم الكتابة من اليمين إلى اليسار</title>
  <style>
    @font-face {
      font-family: 'Adobe Arabic';
      src: url('https://raw.githubusercontent.com/mhmod3/Sub-RTL-Fix/refs/heads/main/22016-adobearabic.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Adobe Arabic', 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.8;
      font-size: clamp(1.125rem, 1.5vw, 1.35rem);
    }
    .main { max-width: 760px; width: 100%; }
    h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-align: center;
      color: #f0f0f0;
      letter-spacing: 0.5px;
    }
    .sub {
      color: #aaa;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      border-bottom: 1px solid #333;
      padding-bottom: 1.2rem;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 2;
    }
    .sub .format-hint {
      display: block;
      font-size: clamp(0.9rem, 1.2vw, 1.1rem);
      color: #777;
      margin-top: 0.25rem;
    }
    .drop {
      border: 2px dashed #444;
      padding: 3rem 1.5rem;
      text-align: center;
      background: #252525;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background 0.2s, border-color 0.2s;
      border-radius: 10px;
    }
    .drop:hover { background: #2e2e2e; border-color: #666; }
    .drop input { display: none; }
    .drop label {
      display: block;
      cursor: pointer;
      color: #ccc;
      font-size: clamp(1.1rem, 1.6vw, 1.4rem);
    }
    .drop span { font-weight: 600; color: #fff; }
    .file-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background: #252525;
      padding: 0.8rem 1.2rem;
      font-size: clamp(1rem, 1.3vw, 1.2rem);
      margin-bottom: 1.5rem;
      border: 1px solid #333;
      border-radius: 8px;
    }
    .file-info .name { font-weight: 500; color: #f0f0f0; }
    .file-info .size { color: #999; }
    .file-list {
      width: 100%;
      margin-top: 0.5rem;
      border-top: 1px solid #333;
      padding-top: 0.5rem;
      max-height: 150px;
      overflow-y: auto;
    }
    .file-list-item {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
      font-size: 0.9rem;
      color: #ccc;
      border-bottom: 1px solid #2a2a2a;
    }
    .file-list-item .fname { color: #e0e0e0; }
    .file-list-item .fsize { color: #888; }
    .actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .actions button {
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e0e0e0;
      padding: 0.7rem 2rem;
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s;
      border-radius: 8px;
      font-family: inherit;
    }
    .actions button.primary {
      background: #3a5a7a;
      color: white;
      border-color: #3a5a7a;
    }
    .actions button.primary:hover { background: #2a4a6a; }
    .actions button.primary:disabled { opacity: 0.5; pointer-events: none; }
    .actions button.secondary:hover { background: #3a3a3a; }
    .output-wrap { display: none; margin-top: 1.5rem; border-top: 1px solid #333; padding-top: 1.5rem; }
    .output-wrap textarea {
      width: 100%;
      height: 260px;
      border: 1px solid #444;
      padding: 1rem;
      font-family: 'Adobe Arabic', 'Courier New', monospace;
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      background: #1e1e1e;
      color: #e0e0e0;
      resize: vertical;
      direction: ltr;
      text-align: left;
      border-radius: 8px;
      line-height: 1.8;
    }
    .out-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .out-actions button {
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e0e0e0;
      padding: 0.6rem 2rem;
      font-size: clamp(1rem, 1.3vw, 1.2rem);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
      border-radius: 8px;
      font-family: inherit;
    }
    .out-actions button.green {
      background: #2a7a5a;
      color: white;
      border-color: #2a7a5a;
    }
    .out-actions button.green:hover { background: #1a6a4a; }
    .out-actions button.gray:hover { background: #3a3a3a; }
    .status {
      margin-top: 1rem;
      font-size: clamp(1rem, 1.3vw, 1.15rem);
      color: #aaa;
      text-align: center;
    }
    .status.error { color: #f77; }
    .status.success { color: #5c9; }
  </style>
</head>
<body>
<div class="main">
  <h1>مُصلح اتجاه النص</h1>
  <div class="sub">
    <span>أداة لضبط اتجاه النصوص في ملفات الترجمة</span>
    <span class="format-hint">يدعم صيغ SRT، VTT، ASS فقط</span>
  </div>

  <div class="drop" id="dropZone">
    <input type="file" id="fileInput" accept=".srt,.vtt,.ass" multiple>
    <label for="fileInput"><span>اختر ملفاً</span> أو اسحب عدة ملفات إلى هنا</label>
  </div>

  <div class="file-info" id="fileInfo" style="display:none;">
    <span class="name" id="fileName">لا يوجد ملف</span>
    <span class="size" id="fileSize">0 ك.ب</span>
    <div class="file-list" id="fileList"></div>
  </div>

  <div class="actions">
    <button class="primary" id="processBtn" disabled>معالجة وإصلاح الكل</button>
    <button class="secondary" id="clearBtn">تفريغ</button>
  </div>

  <div class="output-wrap" id="outputWrap">
    <textarea id="outputText" readonly></textarea>
    <div class="out-actions">
      <button class="green" id="downloadBtn">تحميل الناتج المُدمج</button>
      <button class="gray" id="copyBtn">نسخ النص</button>
    </div>
    <div id="statusMessage" class="status"></div>
  </div>
</div>

<script>
// ============================================================
//  إضافة دوال String.prototype
// ============================================================
if (!String.prototype.clearFormatting) {
  Object.assign(String.prototype, {
    clearFormatting: function() {
      return this.replace(/[\u202A\u202B\u202C\u202D\u202E\u200E\u200F]/g, '');
    },
    toRTL: function() {
      return '\u202B' + this + '\u202C';
    },
    toLTR: function() {
      return '\u202A' + this + '\u202C';
    }
  });
}

// ============================================================
//  دوال استخراج وإعادة العلامات (HTML, {..})
// ============================================================
function extractTags(text) {
  const tags = [];
  const stripped = text.replace(/<[^>]*>|\\{[^}]*\\}/g, function(match) {
    tags.push(match);
    return '\x00' + (tags.length - 1) + '\x00';
  });
  return { stripped, tags };
}

function restoreTags(text, tags) {
  return text.replace(/\x00(\d+)\x00/g, function(_, idx) {
    return tags[parseInt(idx)] || '';
  });
}

// ============================================================
//  تطبيق RTL على النص مع الحفاظ على العلامات
// ============================================================
function fixTextWithRTL(text) {
  if (!text) return text;
  const { stripped, tags } = extractTags(text);
  let cleaned = stripped.clearFormatting();
  const lines = cleaned.split('\n');
  const fixedLines = lines.map(line => line.toRTL());
  let fixed = fixedLines.join('\n');
  return restoreTags(fixed, tags);
}

// ============================================================
//  معالجة الملفات حسب الصيغة
// ============================================================
function detectFormat(content) {
  if (/^\[Script Info\]/im.test(content) || /^Dialogue:/im.test(content)) return 'ass';
  if (/^WEBVTT/i.test(content.trim())) return 'vtt';
  return 'srt';
}

function processSRT(content) {
  const blocks = content.split(/\n\s*\n/);
  const processed = blocks.map(block => {
    const lines = block.split('\n').filter(line => line.trim() !== '');
    if (lines.length < 3) return block;
    const number = lines[0];
    const time = lines[1];
    const textLines = lines.slice(2);
    if (textLines.length === 0) return block;
    let text = textLines.join('\n');
    text = fixTextWithRTL(text);
    const fixedLines = text.split('\n');
    return [number, time, ...fixedLines].join('\n');
  });
  return processed.join('\n\n');
}

function processVTT(content) {
  const lines = content.split('\n');
  let headerEnd = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('-->')) {
      headerEnd = i;
      break;
    }
  }
  const header = lines.slice(0, headerEnd).join('\n');
  const body = lines.slice(headerEnd).join('\n');
  const fixedBody = processSRT(body);
  return header + '\n' + fixedBody;
}

function processASS(content) {
  const lines = content.split('\n');
  const processed = lines.map(line => {
    if (line.startsWith('Dialogue:')) {
      const parts = line.split(',');
      if (parts.length < 10) return line;
      const textPart = parts.slice(9).join(',');
      const fixedText = fixTextWithRTL(textPart);
      const newParts = parts.slice(0, 9);
      newParts.push(fixedText);
      return newParts.join(',');
    }
    if (line.startsWith('Title:')) {
      const titleMatch = line.match(/^Title:\s*(.*)/);
      if (titleMatch) {
        const titleText = titleMatch[1];
        const fixed = fixTextWithRTL(titleText);
        return 'Title: ' + fixed;
      }
    }
    return line;
  });
  return processed.join('\n');
}

function fixSubtitleFile(content) {
  const format = detectFormat(content);
  switch (format) {
    case 'ass': return processASS(content);
    case 'vtt': return processVTT(content);
    default: return processSRT(content);
  }
}

// ============================================================
//  اكتشاف الترميز التلقائي
// ============================================================
function scoreText(text) {
  let score = 0;
  const total = text.length;
  if (total === 0) return 0;
  let arabic = 0, latin = 0, digits = 0, punct = 0, bad = 0;
  for (let i = 0; i < total; i++) {
    const ch = text.charCodeAt(i);
    if (ch >= 0x0600 && ch <= 0x06FF) arabic++;
    else if ((ch >= 0x0041 && ch <= 0x005A) || (ch >= 0x0061 && ch <= 0x007A)) latin++;
    else if (ch >= 0x0030 && ch <= 0x0039) digits++;
    else if (ch === 0x0020 || ch === 0x002E || ch === 0x002C || ch === 0x003F || ch === 0x0021 ||
             ch === 0x003B || ch === 0x003A || ch === 0x002D || ch === 0x005F || ch === 0x0028 ||
             ch === 0x0029 || ch === 0x005B || ch === 0x005D || ch === 0x007B || ch === 0x007D ||
             ch === 0x002F || ch === 0x005C || ch === 0x0040 || ch === 0x0023 || ch === 0x0024 ||
             ch === 0x0025 || ch === 0x005E || ch === 0x0026 || ch === 0x002A) punct++;
    else if (ch > 0x007F && ch < 0x0600) bad++;
  }
  const good = arabic + latin + digits + punct;
  const goodRatio = good / total;
  const badPenalty = bad / total * 0.5;
  const arabicBonus = Math.min(arabic / total * 0.3, 0.3);
  return goodRatio - badPenalty + arabicBonus;
}

function decodeAuto(buffer) {
  const encodings = ['UTF-8', 'windows-1256', 'ISO-8859-6', 'UTF-16LE', 'UTF-16BE', 'CP1256'];
  let best = null;
  let bestScore = -Infinity;
  for (let enc of encodings) {
    try {
      const decoder = new TextDecoder(enc, { fatal: false });
      const decoded = decoder.decode(buffer);
      const score = scoreText(decoded);
      if (score > bestScore) {
        bestScore = score;
        best = { text: decoded, encoding: enc };
      }
    } catch { continue; }
  }
  if (best) return best;
  const fallback = new TextDecoder('UTF-8', { fatal: false });
  const decoded = fallback.decode(buffer);
  return { text: decoded, encoding: 'UTF-8 (fallback)' };
}

// ============================================================
//  التحقق من صيغة الملف (الامتداد)
// ============================================================
function isValidFormat(fileName) {
  const ext = fileName.split('.').pop().toLowerCase();
  return ['srt', 'vtt', 'ass'].includes(ext);
}

// ============================================================
//  واجهة المستخدم – دعم متعدد الملفات
// ============================================================
let fileDataMap = new Map(); // اسم الملف -> { buffer, decodedText, fixedText }
let processedAll = false;

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const fileList = document.getElementById('fileList');
const processBtn = document.getElementById('processBtn');
const clearBtn = document.getElementById('clearBtn');
const outputWrap = document.getElementById('outputWrap');
const outputText = document.getElementById('outputText');
const downloadBtn = document.getElementById('downloadBtn');
const copyBtn = document.getElementById('copyBtn');
const statusMsg = document.getElementById('statusMessage');

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' ب';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' ك.ب';
  return (bytes / (1024 * 1024)).toFixed(1) + ' م.ب';
}

function updateFileInfo(files) {
  if (!files || files.length === 0) {
    fileInfo.style.display = 'none';
    return;
  }
  fileInfo.style.display = 'flex';
  const totalSize = Array.from(files).reduce((sum, f) => sum + f.size, 0);
  fileName.textContent = files.length + ' ملف';
  fileSize.textContent = formatFileSize(totalSize);
  // قائمة الملفات
  fileList.innerHTML = '';
  files.forEach(f => {
    const div = document.createElement('div');
    div.className = 'file-list-item';
    div.innerHTML = `<span class="fname">${f.name}</span><span class="fsize">${formatFileSize(f.size)}</span>`;
    fileList.appendChild(div);
  });
}

function loadFiles(fileList) {
  const validFiles = Array.from(fileList).filter(f => isValidFormat(f.name));
  const invalid = Array.from(fileList).filter(f => !isValidFormat(f.name));
  if (invalid.length > 0) {
    statusMsg.textContent = `تم تجاهل ${invalid.length} ملف(ات) غير صالحة (يُسمح فقط بـ .srt, .vtt, .ass)`;
    statusMsg.className = 'status error';
  } else {
    statusMsg.textContent = '';
    statusMsg.className = 'status';
  }
  if (validFiles.length === 0) {
    processBtn.disabled = true;
    fileDataMap.clear();
    fileInfo.style.display = 'none';
    outputWrap.style.display = 'none';
    return;
  }
  // قراءة كل ملف
  let loadedCount = 0;
  fileDataMap.clear();
  validFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const buffer = e.target.result;
      const result = decodeAuto(buffer);
      fileDataMap.set(file.name, {
        buffer: buffer,
        decodedText: result.text,
        encoding: result.encoding,
        fixedText: null
      });
      loadedCount++;
      if (loadedCount === validFiles.length) {
        // كل الملفات جاهزة
        processBtn.disabled = false;
        updateFileInfo(validFiles);
        // عرض معاينة لأول ملف
        const first = validFiles[0];
        const data = fileDataMap.get(first.name);
        outputText.value = data.decodedText.slice(0, 500) + (data.decodedText.length > 500 ? '\n... (معاينة)' : '');
        outputWrap.style.display = 'block';
        statusMsg.textContent = `تم تحميل ${validFiles.length} ملف(ات). اضغط "معالجة وإصلاح الكل".`;
        statusMsg.className = 'status';
        processedAll = false;
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

// معالجة جميع الملفات
function processAllFiles() {
  if (fileDataMap.size === 0) {
    statusMsg.textContent = 'لا توجد ملفات صالحة للمعالجة.';
    statusMsg.className = 'status error';
    return;
  }
  let resultText = '';
  let successCount = 0;
  for (let [name, data] of fileDataMap) {
    try {
      const fixed = fixSubtitleFile(data.decodedText);
      data.fixedText = fixed;
      successCount++;
      resultText += `========== ${name} ==========\n${fixed}\n\n`;
    } catch (err) {
      resultText += `========== ${name} (خطأ) ==========\n${err.message}\n\n`;
    }
  }
  outputText.value = resultText;
  outputWrap.style.display = 'block';
  processedAll = true;
  statusMsg.textContent = `تمت معالجة ${successCount} ملف(ات) بنجاح.`;
  statusMsg.className = 'status success';
}

// تحميل الناتج المدمج
function downloadMerged() {
  const content = outputText.value;
  if (!content) return;
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'merged_fixed_subtitles.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// أحداث
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.style.background = '#2e2e2e';
});
dropZone.addEventListener('dragleave', () => {
  dropZone.style.background = '#252525';
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.background = '#252525';
  if (e.dataTransfer.files.length > 0) {
    fileInput.files = e.dataTransfer.files;
    loadFiles(e.dataTransfer.files);
  }
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) {
    loadFiles(fileInput.files);
  }
});

processBtn.addEventListener('click', processAllFiles);

downloadBtn.addEventListener('click', downloadMerged);

copyBtn.addEventListener('click', function() {
  const text = outputText.value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    statusMsg.textContent = 'تم نسخ النص إلى الحافظة.';
    statusMsg.className = 'status success';
  }).catch(() => {
    outputText.select();
    document.execCommand('copy');
    statusMsg.textContent = 'تم نسخ النص إلى الحافظة.';
    statusMsg.className = 'status success';
  });
});

clearBtn.addEventListener('click', function() {
  fileInput.value = '';
  fileDataMap.clear();
  fileInfo.style.display = 'none';
  outputWrap.style.display = 'none';
  statusMsg.textContent = '';
  statusMsg.className = 'status';
  processBtn.disabled = true;
  outputText.value = '';
  processedAll = false;
});

processBtn.disabled = true;
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());
</script>
</body>
</html>
