<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>مُصلح الترجمة</title>
  <style>
    @font-face {
      font-family: 'Adobe Arabic';
      src: url('https://raw.githubusercontent.com/mhmod3/Sub-RTL-Fix/refs/heads/main/22016-adobearabic.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Adobe Arabic', 'Segoe UI', system-ui, sans-serif;
      background: #1e1e1e;
      color: #d0d0d0;
      padding: 1.5rem 0.75rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.8;
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      direction: rtl;
      unicode-bidi: embed;
    }
    .main {
      max-width: 860px;
      width: 100%;
      direction: rtl;
      unicode-bidi: embed;
    }
    h1 {
      font-size: clamp(1.8rem, 3.8vw, 2.5rem);
      font-weight: 500;
      margin-bottom: 0.3rem;
      text-align: center;
      color: #dcdcdc;
      letter-spacing: 0.3px;
      direction: rtl;
    }
    .sub {
      color: #999;
      font-size: clamp(0.9rem, 1.2vw, 1.05rem);
      border-bottom: 1px solid #333;
      padding-bottom: 0.9rem;
      margin-bottom: 1.5rem;
      text-align: center;
      line-height: 1.9;
      direction: rtl;
    }
    .sub .format-hint {
      display: block;
      font-size: clamp(0.8rem, 1vw, 0.95rem);
      color: #777;
      margin-top: 0.2rem;
    }
    .drop {
      border: 2px dashed #444;
      padding: 2.2rem 1rem;
      text-align: center;
      background: #252525;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background 0.2s, border-color 0.2s;
      border-radius: 6px;
      direction: rtl;
    }
    .drop:hover { background: #2a2a2a; border-color: #555; }
    .drop input { display: none; }
    .drop label {
      display: block;
      cursor: pointer;
      color: #bbb;
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      direction: rtl;
    }
    .drop span { font-weight: 500; color: #e0e0e0; }

    .file-list {
      background: #222;
      border-radius: 6px;
      margin-bottom: 1rem;
      padding: 0.3rem 0;
      max-height: 340px;
      overflow-y: auto;
      direction: rtl;
    }
    .file-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid #2e2e2e;
      gap: 0.5rem;
      direction: rtl;
    }
    .file-item:last-child { border-bottom: none; }
    .file-item .name {
      flex: 2 1 130px;
      font-size: clamp(0.85rem, 1.1vw, 1rem);
      color: #ccc;
      word-break: break-word;
      text-align: right;
      direction: rtl;
    }
    .file-item .status {
      font-size: clamp(0.75rem, 0.9vw, 0.9rem);
      padding: 0.15rem 0.6rem;
      border-radius: 10px;
      background: #333;
      color: #999;
      text-align: center;
    }
    .file-item .status.ready { background: #2a3a4a; color: #8aacd0; }
    .file-item .status.done { background: #1a3a2a; color: #7aaa8a; }
    .file-item .status.error { background: #3a1a1a; color: #d07a7a; }
    .file-item .status.unsupported { background: #3a2a1a; color: #c09060; }
    .file-item .status.processing { background: #3a3a1a; color: #c0b060; }
    .file-item .actions {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      direction: rtl;
    }
    .file-item .actions button {
      border: 1px solid #444;
      background: #2a2a2a;
      color: #c0c0c0;
      padding: 0.2rem 0.8rem;
      font-size: clamp(0.75rem, 0.9vw, 0.9rem);
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
      direction: rtl;
    }
    .file-item .actions button:hover { background: #3a3a3a; }
    .file-item .actions button.download {
      background: #1a3a2a;
      color: #b0d0b0;
      border-color: #2a4a3a;
    }
    .file-item .actions button.download:hover { background: #1a4a2a; }
    .file-item .actions button.download:disabled { opacity: 0.4; pointer-events: none; }
    .file-item .actions button.preview {
      background: #2a3a4a;
      color: #b0c8d0;
      border-color: #3a4a5a;
    }
    .file-item .actions button.preview:hover { background: #2a4a5a; }
    .file-item .actions button.remove {
      color: #c08080;
      background: transparent;
      border-color: #442222;
    }
    .file-item .actions button.remove:hover { background: #2a1a1a; }

    #previewArea {
      display: none;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.6rem;
      margin: 0.4rem 0 1rem 0;
      direction: ltr;
      text-align: left;
    }
    #previewArea .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
      gap: 0.4rem;
      direction: rtl;
    }
    #previewArea .preview-header .title {
      font-size: clamp(0.9rem, 1.1vw, 1rem);
      color: #b0b0b0;
      font-weight: 400;
      direction: rtl;
    }
    #previewArea .preview-header .close-preview {
      background: transparent;
      border: 1px solid #444;
      color: #999;
      padding: 0.1rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(0.75rem, 0.9vw, 0.9rem);
      font-family: inherit;
      direction: rtl;
    }
    #previewArea .preview-header .close-preview:hover { background: #2a2a2a; }
    #previewArea textarea {
      width: 100%;
      height: 200px;
      padding: 0.5rem;
      font-family: 'Adobe Arabic', 'Courier New', monospace;
      font-size: clamp(0.85rem, 1.1vw, 1rem);
      background: #141414;
      color: #d0d0d0;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      resize: vertical;
      direction: ltr;
      text-align: left;
      line-height: 1.7;
    }

    .global-actions {
      display: flex;
      justify-content: center;
      gap: 0.7rem;
      flex-wrap: wrap;
      margin: 1rem 0 1.2rem;
      direction: rtl;
    }
    .global-actions button {
      border: 1px solid #444;
      background: #2a2a2a;
      color: #c0c0c0;
      padding: 0.5rem 1.6rem;
      font-size: clamp(0.9rem, 1.2vw, 1.05rem);
      cursor: pointer;
      font-weight: 400;
      transition: background 0.15s;
      border-radius: 6px;
      font-family: inherit;
      direction: rtl;
    }
    .global-actions button.primary {
      background: #2a3a4a;
      color: #c8d8e0;
      border-color: #3a4a5a;
    }
    .global-actions button.primary:hover { background: #1a3a4a; }
    .global-actions button.primary:disabled { opacity: 0.4; pointer-events: none; }
    .global-actions button.secondary:hover { background: #333; }

    .status-msg {
      margin-top: 0.4rem;
      font-size: clamp(0.9rem, 1.1vw, 1.05rem);
      color: #999;
      text-align: center;
      direction: rtl;
    }
    .status-msg.error { color: #c08080; }
    .status-msg.success { color: #80b080; }

    @media (max-width: 480px) {
      .file-item { flex-direction: column; align-items: stretch; gap: 0.3rem; }
      .file-item .name { flex: 1; text-align: right; }
      .file-item .actions { justify-content: flex-start; }
      .global-actions button { padding: 0.4rem 1rem; }
      #previewArea textarea { height: 140px; }
    }
  </style>
</head>
<body>
<div class="main">
  <h1>مُصلح اتجاه النص</h1>
  <div class="sub">
    <span>أداة لضبط اتجاه النصوص في ملفات الترجمة</span>
    <span class="format-hint">يدعم الصيغ: SRT، VTT، ASS – إمكانية معالجة عدة ملفات</span>
  </div>

  <div class="drop" id="dropZone">
    <input type="file" id="fileInput" accept=".srt,.vtt,.ass" multiple>
    <label for="fileInput"><span>اختر ملفاً</span> أو اسحب الملفات إلى هنا</label>
  </div>

  <div class="file-list" id="fileList"></div>

  <div id="previewArea">
    <div class="preview-header">
      <span class="title" id="previewTitle">معاينة: ملف</span>
      <button class="close-preview" id="closePreviewBtn">إغلاق</button>
    </div>
    <textarea id="previewContent" readonly></textarea>
  </div>

  <div class="global-actions">
    <button class="primary" id="processAllBtn" disabled>معالجة الكل</button>
    <button class="secondary" id="clearAllBtn">تفريغ القائمة</button>
  </div>

  <div id="globalStatus" class="status-msg"></div>
</div>

<script>
// ============================================================
//  دوال String.prototype الأساسية
// ============================================================
if (!String.prototype.clearFormatting) {
  Object.assign(String.prototype, {
    clearFormatting: function() {
      // إزالة جميع أحكام الاتجاه وأحرف التحكم (FF, CR, TAB, NBSP)
      return this.replace(/[\u202A\u202B\u202C\u202D\u202E\u200E\u200F\u200C\u200D\u000C\u000D\u0009\u00A0]/g, '');
    },
    toRTL: function() {
      return '\u202B' + this + '\u202C';
    },
    toLTR: function() {
      return '\u202A' + this + '\u202C';
    }
  });
}

function extractTags(text) {
  const tags = [];
  const stripped = text.replace(/<[^>]*>|\\{[^}]*\\}/g, function(match) {
    tags.push(match);
    return '\x00' + (tags.length - 1) + '\x00';
  });
  return { stripped, tags };
}

function restoreTags(text, tags) {
  return text.replace(/\x00(\d+)\x00/g, function(_, idx) {
    return tags[parseInt(idx)] || '';
  });
}

function fixTextWithRTL(text) {
  if (!text) return text;
  const { stripped, tags } = extractTags(text);
  let cleaned = stripped.clearFormatting();
  const lines = cleaned.split('\n');
  const fixedLines = lines.map(line => line.toRTL());
  let fixed = fixedLines.join('\n');
  return restoreTags(fixed, tags);
}

function detectFormat(content) {
  if (/^\[Script Info\]/im.test(content) || /^Dialogue:/im.test(content)) return 'ass';
  if (/^WEBVTT/i.test(content.trim())) return 'vtt';
  return 'srt';
}

// ============================================================
//  معالجة SRT و VTT مع فلتر إزالة الأسطر الوهمية
// ============================================================
function processSRT(content) {
  const blocks = content.split(/\n\s*\n/);
  const processed = blocks.map(block => {
    let lines = block.split('\n');
    // تصفية الأسطر التي تتكون فقط من أحكام اتجاه أو أحرف تحكم
    lines = lines.filter(line => {
      if (line.length === 0) return true; // سطر فارغ حقيقي
      const cleaned = line.clearFormatting().trim();
      if (cleaned === '') return false; // سطر وهمي
      return true;
    });
    if (lines.length < 3) return block;
    const number = lines[0];
    const time = lines[1];
    const textLines = lines.slice(2);
    if (textLines.length === 0) return block;
    let text = textLines.join('\n');
    text = fixTextWithRTL(text);
    const fixedLines = text.split('\n');
    return [number, time, ...fixedLines].join('\n');
  });
  return processed.join('\n\n');
}

function processVTT(content) {
  const lines = content.split('\n');
  let headerEnd = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('-->')) {
      headerEnd = i;
      break;
    }
  }
  const header = lines.slice(0, headerEnd).join('\n');
  const body = lines.slice(headerEnd).join('\n');
  const fixedBody = processSRT(body);
  return header + '\n' + fixedBody;
}

// ============================================================
//  معالجة ASS – بدون أي فلتر للأسطر، فقط تعديل النص داخل الحقول
// ============================================================
function processASS(content) {
  const lines = content.split('\n');
  const processed = lines.map(line => {
    if (line.startsWith('Dialogue:')) {
      const parts = line.split(',');
      if (parts.length < 10) return line;
      const textPart = parts.slice(9).join(',');
      const fixedText = fixTextWithRTL(textPart);
      const newParts = parts.slice(0, 9);
      newParts.push(fixedText);
      return newParts.join(',');
    }
    if (line.startsWith('Title:')) {
      const titleMatch = line.match(/^Title:\s*(.*)/);
      if (titleMatch) {
        const titleText = titleMatch[1];
        const fixed = fixTextWithRTL(titleText);
        return 'Title: ' + fixed;
      }
    }
    // نعيد باقي الأسطر كما هي دون تغيير (بما فيها الأسطر الفارغة)
    return line;
  });
  return processed.join('\n');
}

function fixSubtitleFile(content) {
  const format = detectFormat(content);
  switch (format) {
    case 'ass': return processASS(content);
    case 'vtt': return processVTT(content);
    default: return processSRT(content);
  }
}

// ============================================================
//  اكتشاف الترميز التلقائي
// ============================================================
function scoreText(text) {
  let score = 0;
  const total = text.length;
  if (total === 0) return 0;
  let arabic = 0, latin = 0, digits = 0, punct = 0, bad = 0;
  for (let i = 0; i < total; i++) {
    const ch = text.charCodeAt(i);
    if (ch >= 0x0600 && ch <= 0x06FF) arabic++;
    else if ((ch >= 0x0041 && ch <= 0x005A) || (ch >= 0x0061 && ch <= 0x007A)) latin++;
    else if (ch >= 0x0030 && ch <= 0x0039) digits++;
    else if (ch === 0x0020 || ch === 0x002E || ch === 0x002C || ch === 0x003F || ch === 0x0021 ||
             ch === 0x003B || ch === 0x003A || ch === 0x002D || ch === 0x005F || ch === 0x0028 ||
             ch === 0x0029 || ch === 0x005B || ch === 0x005D || ch === 0x007B || ch === 0x007D ||
             ch === 0x002F || ch === 0x005C || ch === 0x0040 || ch === 0x0023 || ch === 0x0024 ||
             ch === 0x0025 || ch === 0x005E || ch === 0x0026 || ch === 0x002A) punct++;
    else if (ch > 0x007F && ch < 0x0600) bad++;
  }
  const good = arabic + latin + digits + punct;
  const goodRatio = good / total;
  const badPenalty = bad / total * 0.5;
  const arabicBonus = Math.min(arabic / total * 0.3, 0.3);
  return goodRatio - badPenalty + arabicBonus;
}

function decodeAuto(buffer) {
  const encodings = ['UTF-8', 'windows-1256', 'ISO-8859-6', 'UTF-16LE', 'UTF-16BE', 'CP1256'];
  let best = null;
  let bestScore = -Infinity;
  for (let enc of encodings) {
    try {
      const decoder = new TextDecoder(enc, { fatal: false });
      const decoded = decoder.decode(buffer);
      const score = scoreText(decoded);
      if (score > bestScore) {
        bestScore = score;
        best = { text: decoded, encoding: enc };
      }
    } catch { continue; }
  }
  if (best) return best;
  const fallback = new TextDecoder('UTF-8', { fatal: false });
  const decoded = fallback.decode(buffer);
  return { text: decoded, encoding: 'UTF-8 (fallback)' };
}

// ============================================================
//  إدارة الملفات
// ============================================================
let fileItems = [];
let currentPreviewIndex = -1;

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileList = document.getElementById('fileList');
const processAllBtn = document.getElementById('processAllBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const globalStatus = document.getElementById('globalStatus');
const previewArea = document.getElementById('previewArea');
const previewTitle = document.getElementById('previewTitle');
const previewContent = document.getElementById('previewContent');
const closePreviewBtn = document.getElementById('closePreviewBtn');

function closePreview() {
  previewArea.style.display = 'none';
  currentPreviewIndex = -1;
}

function showPreview(index) {
  const item = fileItems[index];
  if (!item) return;
  closePreview();

  let displayText = '';
  let titleSuffix = '';
  if (item.status === 'done' && item.fixedText) {
    displayText = item.fixedText;
    titleSuffix = '(مُصلح)';
  } else if (item.decodedText) {
    displayText = item.decodedText;
    titleSuffix = '(خام)';
  } else {
    displayText = 'لا يوجد نص للمعاينة.';
    titleSuffix = '(فارغ)';
  }

  previewTitle.textContent = 'معاينة: ' + item.name + ' ' + titleSuffix;
  previewContent.value = displayText;
  previewArea.style.display = 'block';
  currentPreviewIndex = index;
}

function updateProcessAllButton() {
  const hasUnprocessed = fileItems.some(item => item.status === 'ready');
  processAllBtn.disabled = !hasUnprocessed;
}

function renderFileList() {
  if (fileItems.length === 0) {
    fileList.innerHTML = '<div style="padding:0.8rem;text-align:center;color:#666;">لا توجد ملفات مضافة</div>';
    updateProcessAllButton();
    closePreview();
    return;
  }

  let html = '';
  fileItems.forEach((item, index) => {
    const statusMap = {
      'ready': 'جاهز',
      'processing': 'جارِ المعالجة',
      'done': 'مُعالج',
      'error': 'خطأ',
      'unsupported': 'غير مدعوم'
    };
    const statusClass = item.status;
    const nameDisplay = item.name.length > 35 ? item.name.slice(0, 32) + '…' : item.name;
    html += `
      <div class="file-item" data-index="${index}">
        <span class="name" title="${item.name}">${nameDisplay}</span>
        <span class="status ${statusClass}">${statusMap[item.status] || item.status}</span>
        <div class="actions">
          ${item.status === 'done' ? `<button class="download" data-index="${index}">تحميل</button>` : ''}
          <button class="preview" data-index="${index}">معاينة</button>
          <button class="remove" data-index="${index}">حذف</button>
        </div>
      </div>
    `;
  });
  fileList.innerHTML = html;

  fileList.querySelectorAll('.download').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const idx = parseInt(this.dataset.index);
      downloadFile(idx);
    });
  });
  fileList.querySelectorAll('.preview').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const idx = parseInt(this.dataset.index);
      if (currentPreviewIndex === idx && previewArea.style.display === 'block') {
        closePreview();
      } else {
        showPreview(idx);
      }
    });
  });
  fileList.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const idx = parseInt(this.dataset.index);
      removeFile(idx);
    });
  });

  updateProcessAllButton();
  if (currentPreviewIndex !== -1 && !fileItems[currentPreviewIndex]) {
    closePreview();
  }
}

function addFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const supported = ['srt', 'vtt', 'ass'];
  if (!supported.includes(ext)) {
    fileItems.push({
      name: file.name,
      file: file,
      status: 'unsupported',
      decodedText: null,
      fixedText: null,
      error: null
    });
    renderFileList();
    globalStatus.textContent = 'الملف "' + file.name + '" غير مدعوم (الصيغ المسموحة: SRT, VTT, ASS)';
    globalStatus.className = 'status-msg error';
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const buffer = e.target.result;
    const result = decodeAuto(buffer);
    const decoded = result.text;
    fileItems.push({
      name: file.name,
      file: file,
      status: 'ready',
      decodedText: decoded,
      fixedText: null,
      error: null,
      encoding: result.encoding
    });
    renderFileList();
    globalStatus.textContent = 'تمت إضافة "' + file.name + '" (' + result.encoding + ')';
    globalStatus.className = 'status-msg success';
  };
  reader.onerror = function(err) {
    fileItems.push({
      name: file.name,
      file: file,
      status: 'error',
      decodedText: null,
      fixedText: null,
      error: 'فشل القراءة'
    });
    renderFileList();
    globalStatus.textContent = 'خطأ في قراءة "' + file.name + '"';
    globalStatus.className = 'status-msg error';
  };
  reader.readAsArrayBuffer(file);
}

function removeFile(index) {
  if (currentPreviewIndex === index) {
    closePreview();
  } else if (currentPreviewIndex > index) {
    currentPreviewIndex--;
  }
  fileItems.splice(index, 1);
  renderFileList();
  globalStatus.textContent = '';
  globalStatus.className = 'status-msg';
}

function processSingleFile(index) {
  const item = fileItems[index];
  if (!item || item.status !== 'ready') return;

  item.status = 'processing';
  renderFileList();

  try {
    const fixed = fixSubtitleFile(item.decodedText);
    item.fixedText = fixed;
    item.status = 'done';
  } catch (err) {
    item.status = 'error';
    item.error = err.message;
  }
  renderFileList();
  if (currentPreviewIndex === index) {
    showPreview(index);
  }
  updateProcessAllButton();
}

// ============================================================
//  دالة التحميل
// ============================================================
function downloadFile(index) {
  const item = fileItems[index];
  if (!item || item.status !== 'done' || !item.fixedText) return;

  const originalExt = item.name.includes('.') ? item.name.split('.').pop().toLowerCase() : 'srt';
  const mimeTypes = {
    'srt': 'text/plain',
    'vtt': 'text/vtt',
    'ass': 'text/plain'
  };
  const mimeType = mimeTypes[originalExt] || 'application/octet-stream';

  const baseName = item.name.replace(/\.[^.]+$/, '');
  const newName = baseName + '_مصلح.' + originalExt;

  const blob = new Blob([item.fixedText], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = newName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function processAllFiles() {
  const readyIndices = [];
  fileItems.forEach((item, idx) => {
    if (item.status === 'ready') readyIndices.push(idx);
  });
  if (readyIndices.length === 0) {
    globalStatus.textContent = 'لا توجد ملفات جاهزة للمعالجة.';
    globalStatus.className = 'status-msg error';
    return;
  }
  globalStatus.textContent = 'جارِ معالجة ' + readyIndices.length + ' ملف...';
  globalStatus.className = 'status-msg';

  let processedCount = 0;
  readyIndices.forEach((idx, i) => {
    setTimeout(() => {
      processSingleFile(idx);
      processedCount++;
      if (processedCount === readyIndices.length) {
        globalStatus.textContent = 'تمت معالجة ' + processedCount + ' ملف بنجاح.';
        globalStatus.className = 'status-msg success';
      }
    }, i * 150);
  });
}

function clearAll() {
  if (fileItems.length > 0) {
    fileItems = [];
    closePreview();
    renderFileList();
    globalStatus.textContent = '';
    globalStatus.className = 'status-msg';
  }
}

// ============================================================
//  الأحداث
// ============================================================
fileInput.addEventListener('change', function(e) {
  const files = this.files;
  if (files.length === 0) return;
  for (let f of files) {
    addFile(f);
  }
  this.value = '';
});

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.style.background = '#2a2a2a';
});
dropZone.addEventListener('dragleave', () => {
  dropZone.style.background = '#252525';
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.background = '#252525';
  const files = e.dataTransfer.files;
  if (files.length === 0) return;
  for (let f of files) {
    addFile(f);
  }
});

closePreviewBtn.addEventListener('click', closePreview);

processAllBtn.addEventListener('click', processAllFiles);
clearAllBtn.addEventListener('click', clearAll);

renderFileList();

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());
</script>
</body>
</html>
